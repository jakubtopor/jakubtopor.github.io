<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakub Topór</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="header-profile">
                <img src="img/avatar.jpeg" alt="Zdjęcie Jakub Topór" class="avatar">
                <div class="header-text">
                    <h1>Jakub Topór</h1>
                </div>
            </div>
        </header>

        <!-- Slider hero — wypełniany dynamicznie przez JS na podstawie listy postów poniżej. -->
        <div id="hero-slider" class="slider-container"></div>

        <main>
            <h2>Projekty i Posty</h2>
            <ul class="posts">
                <li class="post-item">
                    <span class="date">Aplikacja</span>
                    <a href="hangboard.html">Hangboard Timer <span class="app-badge">Tool</span></a>
                </li>

                <!--
                    data-img — ścieżka do zdjęcia okładkowego dla slidera hero.
                    Posty bez atrybutu data-img nie trafią do slidera.
                -->
                <li class="post-item">
                    <span class="date">2026-03-20</span>
                    <a href="posts/2026_03_20_bukowa_gora/2026_03_20_bukowa_gora.html"
                       data-img="posts/2026_03_20_bukowa_gora/bukowa_gora_1.jpeg">[bouldering] Bukowa Góra</a>
                </li>
            </ul>
        </main>

        <footer>
            <p>© 2026 made with ❤️ Jakub Topór, <a href="mailto:jakubtopor@proton.me">kontakt</a></p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // Zbieramy tylko te posty, które mają atrybut data-img (zdjęcie okładkowe).
            const postItems = Array.from(document.querySelectorAll('.post-item a[data-img]'));
            const slider    = document.getElementById('hero-slider');

            // Tasujemy tablicę i bierzemy maksymalnie 3 posty do slidera.
            const selected = postItems
                .sort(() => 0.5 - Math.random())
                .slice(0, 3);

            // Budujemy slajdy i wstawiamy je do kontenera.
            selected.forEach((post, index) => {
                const link  = post.getAttribute('href');
                const title = post.innerText;
                const img   = post.getAttribute('data-img');

                if (!img) return;

                const slide = document.createElement('a');
                slide.href      = link;
                // Pierwszy slajd od razu widoczny — pozostałe czekają na rotację.
                slide.className = index === 0 ? 'slide active' : 'slide';
                slide.innerHTML = `
                    <img src="${img}" alt="${title}">
                    <div class="slide-title">${title}</div>
                `;
                slider.appendChild(slide);
            });

            // Uruchamiamy automatyczną rotację tylko jeśli jest więcej niż 1 slajd.
            const slides = document.querySelectorAll('.slide');

            if (slides.length > 1) {
                let current = 0;
                setInterval(() => {
                    slides[current].classList.remove('active');
                    current = (current + 1) % slides.length; // zapętlamy na końcu
                    slides[current].classList.add('active');
                }, 5000); // zmiana co 5 sekund
            } else if (slides.length === 0) {
                // Brak postów ze zdjęciami — ukrywamy pusty kontener slidera.
                slider.style.display = 'none';
            }
        });
    </script>

</body>
</html>
