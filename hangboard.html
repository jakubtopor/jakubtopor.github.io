<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangboard Timer — Jakub Topór</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="img/avatar.jpeg">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/hangboard.css">
</head>
<body>

<div class="container">
    <header>
        <div class="header-profile">
            <img src="img/avatar.jpeg" alt="Avatar" class="avatar">
            <div class="header-text">
                <h1>Jakub Topór</h1>
                <p class="subtitle">hangboard timer</p>
            </div>
        </div>
        <nav><a href="index.html">← powrót</a></nav>
    </header>

    <section>
        <h2>Ustawienia</h2>
        <div class="config">
            <div class="field">
                <label>Ćwiczenie (s)</label>
                <div class="input-row">
                    <button onclick="adj('exercise',-1)">−</button>
                    <input id="exerciseTime" type="number" value="10">
                    <button onclick="adj('exercise',1)">+</button>
                </div>
            </div>
            <div class="field">
                <label>Odpoczynek (s)</label>
                <div class="input-row">
                    <button onclick="adj('rest',-1)">−</button>
                    <input id="restTime" type="number" value="30">
                    <button onclick="adj('rest',1)">+</button>
                </div>
            </div>
            <div class="field">
                <label>Powtórzenia</label>
                <div class="input-row">
                    <button onclick="adj('reps',-1)">−</button>
                    <input id="repsCount" type="number" value="6">
                    <button onclick="adj('reps',1)">+</button>
                </div>
            </div>
            <div class="field">
                <label>Obciążenie (kg)</label>
                <div class="input-row">
                    <button onclick="adj('weight',-1)">−</button>
                    <input id="weightValue" type="number" value="0">
                    <button onclick="adj('weight',1)">+</button>
                </div>
            </div>
        </div>
    </section>

    <div class="timer-section">
        <div class="phase-row">
            <span id="phaseLabel">gotowy</span>
            <span id="repDisplay"></span>
        </div>
        <div id="timerDisplay">—</div>
        <div class="progress-track"><div id="progressBar"></div></div>
        <div id="doneMsg" style="display:none; color:#2a7a2a; margin-top:10px; font-size:13px; font-weight:600;"></div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="toggleStart()">Start</button>
        <button id="resetBtn" onclick="resetTimer()">Reset</button>
        <button id="googleBtn" onclick="handleGoogleAuth()">
            <span id="googleBtnText">Zaloguj przez Google</span>
        </button>
    </div>

    <div class="log-section">
        <div class="log-header" style="display:flex; justify-content:space-between; align-items:baseline;">
            <h2>Historia sesji</h2>
            <span id="syncStatus">zaloguj się, by zapisywać</span>
        </div>
        <ul class="log-list" id="logList"></ul>
    </div>

    <footer>
        <p>© 2026 made with ❤️ Jakub Topór, <a href="mailto:jakubtopor@proton.me">kontakt</a> · <a href="privacy.html">Polityka prywatności</a></p>
    </footer>
</div>

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="js/hangboard.js"></script>

</body>
</html>
